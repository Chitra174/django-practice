{% load static %}
{% load crispy_forms_tags %}

<html>
    <head>
        <title>Profile page</title>
        <link rel="stylesheet" type"text/css" href="https://bootswatch.com/5/morph/bootstrap.min.css">
        <link rel="stylesheet" type"text/css" href="{% static 'css/styles.css' %}">
    </head>
     <div class="container bg-white shadow-md p-5">
    <h1>Profile management</h1>
    <form method="POST" autocomplete="off">
        {% csrf_token %}
        {{user_form.username|as_crispy_field }}
        <br>
        {{user_form.password|as_crispy_field }}
        <br>
        <input class="btn btn-primary" type="Submit" value="Submit"/>
    </form>
    </div>
    <div class="container bg-white shadow-md p-5">
        <h3>Upload your profile picture</h3>
        <form method="POST" autocomplete="off" enctype="multipart/form-data">
            {% csrf_token %}
            {{profile_form.profile_pic|as_crispy_field }}
            <br>
            <input class="btn btn-primary" type="Submit" value="Submit"/>
        </form>
    </div>
    <div class="container bg-white shadow-md p-5">
        <a href="{% url 'delete-account' %}">Delete account</a>
    </div>
    <script src="{% static 'js/app.js' %}"></script>
</html>
