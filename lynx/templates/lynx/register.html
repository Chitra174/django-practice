{% load static %}
{% load crispy_forms_tags %}
<html>
    <head>
        <title>Register page</title>
        <link rel="stylesheet" type"text/css" href="https://bootswatch.com/5/morph/bootstrap.min.css">
        <link rel="stylesheet" type"text/css" href="{% static 'css/styles.css' %}">
    </head>
    <br>
    <div class="container bg-white shadow-md p-5">
    <h1>Register my login</h1>
    <form method="POST" autocomplete="off">
        {% csrf_token %}
        {{form.username|as_crispy_field }}
        <br>
        {{form.email|as_crispy_field }}
        <br>
        {{form.password1|as_crispy_field }}
        <br>
        {{form.password2|as_crispy_field }}
        <br>
        <input class="btn btn-primary" type="Submit" value="Create account"/>
    </form>
    <br>
    <p>Already have an account ?</p><a href="{% url 'my-login' %}">Login</a>
    </div>
    <br>
    <script src="{% static 'js/app.js' %}"></script>
</html>
